name: 🚀 PANACEA ICONO CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 🔍 Code Quality & Security
  quality:
    name: 🔍 Code Quality & Security
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint mypy black isort bandit safety
        
    - name: 🔍 Lint code
      run: |
        pylint *.py --disable=C0114,C0116 || true
        black --check *.py || true
        isort --check-only *.py || true
        
    - name: 🔒 Security scan
      run: |
        bandit -r . -f json -o bandit-report.json || true
        safety check || true
        
    - name: 📊 Upload security report
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: bandit-report.json

  # 🐳 Docker Build & Test
  docker:
    name: 🐳 Docker Build & Test
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: 🔐 Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 🏗️ Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ${{ env.IMAGE_NAME }}:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: 🧪 Test Docker image
      run: |
        docker run --rm ${{ env.IMAGE_NAME }}:test python -c "print('✅ Docker image test passed')"

  # 🚀 Deploy to Heroku
  deploy:
    name: 🚀 Deploy to Heroku
    runs-on: ubuntu-latest
    needs: [quality, docker]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🚀 Deploy to Heroku
      uses: akhileshns/heroku-deploy@v3.12.14
      with:
        heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
        heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
        heroku_email: ${{ secrets.HEROKU_EMAIL }}
        appdir: "."
        
    - name: 🔍 Health check
      run: |
        sleep 30
        curl -f https://${{ secrets.HEROKU_APP_NAME }}.herokuapp.com/health || exit 1

  # 📊 Notifications
  notify:
    name: 📊 Notifications
    runs-on: ubuntu-latest
    needs: [quality, docker, deploy]
    if: always()
    
    steps:
    - name: 📧 Notify on success
      if: success()
      run: |
        echo "✅ All checks passed successfully!"
        echo "🚀 Deployment completed!"
        
    - name: 📧 Notify on failure
      if: failure()
      run: |
        echo "❌ Some checks failed!"
        echo "🔍 Check the logs for details!"
