name: 🚀 PANACEA ICONO CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production
      create_release:
        description: 'Create GitHub release'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  ENVIRONMENT: ${{ github.event.inputs.environment || 'development' }}

jobs:
  # 🔧 Setup and Environment Detection
  setup:
    name: 🔧 Setup and Environment Detection
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      is_release: ${{ steps.env.outputs.is_release }}
      version: ${{ steps.env.outputs.version }}
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🎯 Determine environment and version
      id: env
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "environment=production" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
          echo "environment=staging" >> $GITHUB_OUTPUT
        else
          echo "environment=development" >> $GITHUB_OUTPUT
        fi
        
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "is_release=true" >> $GITHUB_OUTPUT
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          echo "is_release=false" >> $GITHUB_OUTPUT
          echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        fi

  # 🔍 Code Quality & Security
  quality:
    name: 🔍 Code Quality & Security
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint mypy black isort bandit safety
        
    - name: 🔍 Lint code
      run: |
        pylint *.py --disable=C0114,C0116 || true
        black --check *.py || true
        isort --check-only *.py || true
        
    - name: 🔒 Security scan
      run: |
        bandit -r . -f json -o bandit-report.json || true
        safety check || true
        
    - name: 📊 Upload security report
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: bandit-report.json

  # 🐳 Docker Build & Test
  docker:
    name: 🐳 Docker Build & Test
    runs-on: ubuntu-latest
    needs: [setup, quality]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: 🔐 Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 🏗️ Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ${{ env.IMAGE_NAME }}:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: 🧪 Test Docker image
      run: |
        docker run --rm ${{ env.IMAGE_NAME }}:test python -c "print('✅ Docker image test passed')"

  # 🚀 Deploy to Environment
  deploy:
    name: 🚀 Deploy to ${{ needs.setup.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [setup, quality, docker]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🎯 Set deployment target
      id: target
      run: |
        if [[ "${{ needs.setup.outputs.environment }}" == "production" ]]; then
          echo "app_name=${{ secrets.HEROKU_APP_NAME }}" >> $GITHUB_OUTPUT
        else
          echo "app_name=${{ secrets.HEROKU_APP_NAME }}-${{ needs.setup.outputs.environment }}" >> $GITHUB_OUTPUT
        fi
      
    - name: 🚀 Deploy to Heroku
      uses: akhileshns/heroku-deploy@v3.12.14
      with:
        heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
        heroku_app_name: ${{ steps.target.outputs.app_name }}
        heroku_email: ${{ secrets.HEROKU_EMAIL }}
        appdir: "."
        
    - name: 🔍 Health check
      run: |
        sleep 30
        curl -f https://${{ steps.target.outputs.app_name }}.herokuapp.com/health || exit 1
        
    - name: 📊 Test deployment endpoints
      run: |
        echo "Testing new deployment endpoints..."
        curl -f https://${{ steps.target.outputs.app_name }}.herokuapp.com/deploy/environments || true
        curl -f https://${{ steps.target.outputs.app_name }}.herokuapp.com/deploy/status/production || true
        curl -f https://${{ steps.target.outputs.app_name }}.herokuapp.com/deploy/links || true

  # 📦 Package and Registry
  package:
    name: 📦 Package and Registry
    runs-on: ubuntu-latest
    needs: [setup, quality, docker]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: 🔐 Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 🏷️ Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha
          
    - name: 📦 Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # 🏷️ Create Release
  release:
    name: 🏷️ Create GitHub Release  
    runs-on: ubuntu-latest
    needs: [setup, quality, docker, package]
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: 🏷️ Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ needs.setup.outputs.version }}
        release_name: PANACEA ICONO ${{ needs.setup.outputs.version }}
        body: |
          ## 🚀 PANACEA ICONO Release ${{ needs.setup.outputs.version }}
          
          ### ✨ New Features
          - Enhanced deployment workflows with environment-specific routes
          - GitHub integration (gists, tags, releases)
          - Environment objective tracking
          - Package management endpoints
          - Link management system
          - Projection and analytics endpoints
          
          ### 🔧 Improvements  
          - Upgraded CI/CD pipeline with multi-environment support
          - Enhanced Docker image with better caching
          - Improved health check endpoints
          
          ### 📦 Artifacts
          - Docker image: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.version }}`
          - Source code archive
          
          ### 🌐 Deployments
          - Production: https://panacea-icono-ai-78b4eb86c23b.herokuapp.com
          - Documentation: https://panacea-icono.org
          
        draft: false
        prerelease: ${{ contains(needs.setup.outputs.version, 'rc') || contains(needs.setup.outputs.version, 'beta') || contains(needs.setup.outputs.version, 'alpha') }}

  # 📊 Notifications
  notify:
    name: 📊 Notifications
    runs-on: ubuntu-latest
    needs: [setup, quality, docker, deploy, package, release]
    if: always()
    
    steps:
    - name: 📧 Notify on success
      if: success()
      run: |
        echo "✅ All checks passed successfully!"
        echo "🚀 Deployment to ${{ needs.setup.outputs.environment }} completed!"
        echo "📦 Package published: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.version }}"
        if [[ "${{ needs.setup.outputs.is_release }}" == "true" ]]; then
          echo "🏷️ Release ${{ needs.setup.outputs.version }} created!"
        fi
        
    - name: 📧 Notify on failure
      if: failure()
      run: |
        echo "❌ Some checks failed!"
        echo "🔍 Check the logs for details!"
        echo "🎯 Target environment: ${{ needs.setup.outputs.environment }}"
